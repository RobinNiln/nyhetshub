<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyhetsHub – Svenska nyheter samlat</title>
  <meta name="description" content="Snabb överblick över Sveriges nyheter från SVT, DN, Aftonbladet och fler – nationellt och regionalt.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://nyhetshub.se/">
  <meta property="og:title" content="NyhetsHub – Svenska nyheter">
  <meta property="og:description" content="Nyheter från alla stora svenska medier, samlat och rankat.">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebSite","name":"NyhetsHub","url":"https://nyhetshub.se","description":"Aggregerad svensk nyhetstjänst","potentialAction":{"@type":"SearchAction","target":"https://nyhetshub.se/?q={search_term_string}","query-input":"required name=search_term_string"}}
  </script>

  <style>
    :root {
      --red: #e63946;
      --dark: #0d1117;
      --dark2: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --bg: #0d1117;
      --card: #161b22;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* Header */
    header { background:var(--dark2); border-bottom:1px solid var(--border); padding:0 24px; position:sticky; top:0; z-index:100; }
    .header-inner { max-width:1280px; margin:0 auto; display:flex; align-items:center; gap:16px; height:56px; }
    .logo { font-size:1.3rem; font-weight:800; letter-spacing:-0.5px; white-space:nowrap; }
    .logo span { color:var(--red); }
    .header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .lang-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:0.8rem; transition:all 0.15s; }
    .lang-btn:hover { border-color:var(--red); color:var(--text); }

    /* AdSense leaderboard */
    .ad-top { background:var(--dark2); border-bottom:1px solid var(--border); padding:8px; text-align:center; min-height:60px; display:flex; align-items:center; justify-content:center; }
    .ad-label { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; border:1px dashed var(--border); padding:16px 40px; border-radius:4px; }

    /* Mode toggle (Nationellt / Regionalt) */
    .mode-bar { background:var(--dark2); border-bottom:1px solid var(--border); padding:0 24px; }
    .mode-inner { max-width:1280px; margin:0 auto; display:flex; gap:0; }
    .mode-btn { background:none; border:none; color:var(--muted); padding:14px 20px; cursor:pointer; font-size:0.9rem; font-weight:600; border-bottom:3px solid transparent; transition:all 0.15s; }
    .mode-btn.active { color:var(--red); border-bottom-color:var(--red); }

    /* Kategori / region-nav */
    nav { background:var(--dark2); border-bottom:1px solid var(--border); overflow-x:auto; white-space:nowrap; scrollbar-width:none; }
    nav::-webkit-scrollbar { display:none; }
    .nav-inner { max-width:1280px; margin:0 auto; padding:0 24px; display:flex; gap:2px; }
    .cat-btn { background:none; border:none; color:var(--muted); padding:10px 14px; cursor:pointer; font-size:0.82rem; border-radius:6px; transition:all 0.15s; white-space:nowrap; margin:4px 0; }
    .cat-btn:hover { color:var(--text); background:rgba(255,255,255,0.05); }
    .cat-btn.active { color:var(--red); background:rgba(230,57,70,0.1); font-weight:600; }

    /* Layout */
    .layout { max-width:1280px; margin:24px auto; padding:0 24px; display:grid; grid-template-columns:1fr 300px; gap:24px; }
    @media(max-width:900px){ .layout{grid-template-columns:1fr; padding:0 16px;} .sidebar{display:none;} }

    /* Grid */
    #news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; align-content:start; }

    /* Kort */
    .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; display:flex; flex-direction:column; gap:8px; transition:border-color 0.15s; }
    .card:hover { border-color:#555; }
    .card-meta { display:flex; align-items:center; gap:6px; }
    .source { font-size:0.7rem; font-weight:700; color:var(--red); text-transform:uppercase; letter-spacing:0.5px; }
    .badge { margin-left:auto; font-size:0.65rem; background:rgba(255,255,255,0.06); color:var(--muted); padding:2px 7px; border-radius:10px; }
    .card a { color:var(--text); text-decoration:none; font-size:0.9rem; font-weight:500; line-height:1.45; }
    .card a:hover { color:#fff; }
    .card-time { font-size:0.72rem; color:var(--muted); }

    /* Ad in-feed */
    .ad-feed { background:var(--card); border:1px dashed var(--border); border-radius:8px; min-height:100px; display:flex; align-items:center; justify-content:center; }

    /* Sidebar */
    .sidebar { display:flex; flex-direction:column; gap:16px; }
    .widget { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; }
    .widget-title { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:12px; }
    .trend-item { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .trend-item:last-child { border:none; }
    .trend-num { font-size:1rem; font-weight:800; color:var(--border); min-width:20px; }
    .trend-item a { font-size:0.82rem; color:var(--text); text-decoration:none; line-height:1.3; }
    .trend-item a:hover { color:var(--red); }

    /* States */
    .state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }
    .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Status-bar */
    .status { font-size:0.72rem; color:var(--muted); margin-bottom:12px; }
    .dot-live { display:inline-block; width:6px; height:6px; background:#3fb950; border-radius:50%; margin-right:4px; }

    footer { border-top:1px solid var(--border); text-align:center; padding:20px; font-size:0.78rem; color:var(--muted); margin-top:20px; }
  </style>
</head>

      <div class="ad-label">Annons 300×250</div>
    </div>
    <div class="widget">
      <div class="widget-title" id="t-trending">🔥 Trending</div>
      <div id="trending"></div>
    </div>
  </aside>
</div>

<footer>
  <span id="t-footer">© 2025 NyhetsHub – nyheter aggregerade från svenska medier</span>
</footer>

<script>

let regions = [];

  const res = await fetch('/api/regions');
  regions = await res.json();
  renderTabs();
  load();
}

function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  current = m === 'national' ? 'alla' : regions[0];
  renderTabs();
  load();
}

function renderTabs() {
  const nav = document.getElementById('tab-nav');
  if (mode === 'national') {
    nav.innerHTML = CATS.map(c =>
      `<button class="cat-btn${c.id===current?' active':''}" onclick="select('${c.id}',this)">${lang==='sv'?c.sv:c.en}</button>`
    ).join('');
  } else {
    nav.innerHTML = regions.map(r =>
      `<button class="cat-btn${r===current?' active':''}" onclick="select('${r}',this)">${r}</button>`
    ).join('');
  }
}

function select(val, el) {
  current = val;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  load();
}

      : `/api/news?region=${encodeURIComponent(current)}`;

    document.getElementById('news-grid').innerHTML = '<div class="state">Kunde inte hämta nyheter.</div>';
  }
}
