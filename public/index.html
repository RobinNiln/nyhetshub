<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyhetsHub – Svenska nyheter samlat</title>
  <meta name="description" content="Snabb överblick över Sveriges nyheter från SVT, DN, Aftonbladet och 40+ medier – nationellt och regionalt.">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
  <link rel="canonical" href="https://nyhetshub.se/">
  <link rel="alternate" hreflang="sv" href="https://nyhetshub.se/">
  <link rel="alternate" hreflang="en" href="https://nyhetshub.se/?lang=en">
  <link rel="alternate" hreflang="x-default" href="https://nyhetshub.se/">

  <!-- Open Graph -->
  <meta property="og:title" content="NyhetsHub – Svenska nyheter samlat">
  <meta property="og:description" content="Nyheter från alla stora svenska medier, samlat och rankat i realtid.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nyhetshub.se/">
  <meta property="og:locale" content="sv_SE">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="NyhetsHub – Svenska nyheter">
  <meta name="twitter:description" content="Nyheter från alla stora svenska medier, samlat och rankat i realtid.">

  <!-- Schema.org WebSite (ersätts dynamiskt av server vid behov) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "NyhetsHub",
    "url": "https://nyhetshub.se",
    "description": "Aggregerad svensk nyhetstjänst – nyheter från SVT, DN, Aftonbladet och 40+ medier",
    "inLanguage": ["sv", "en"],
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://nyhetshub.se/?category={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --red: #e8001c;
      --card: #ffffff;
      --border: #e5e5e5;
      --text: #111111;
      --muted: #888;
      --hover: #fafafa;
      --bg: #f4f4f4;
      --header-bg: rgba(255,255,255,0.97);
      --nav-bg: #fff;
      --ingress: #555;
    }
    [data-theme="dark"] {
      --card: #111111;
      --border: #222;
      --text: #f0f0f0;
      --muted: #666;
      --hover: #1a1a1a;
      --bg: #0a0a0a;
      --header-bg: rgba(10,10,10,0.95);
      --nav-bg: #0a0a0a;
      --ingress: #999;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background 0.2s,color 0.2s; }
    header { border-bottom:1px solid var(--border); padding:0 24px; position:sticky; top:0; z-index:100; background:var(--header-bg); backdrop-filter:blur(12px); }
    .header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; height:54px; gap:16px; }
    .logo { font-family:'Syne',sans-serif; font-size:1.35rem; font-weight:800; letter-spacing:-1px; }
    .logo em { color:var(--red); font-style:normal; }
    .header-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .pill-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 13px; border-radius:20px; cursor:pointer; font-size:0.78rem; font-family:'Inter',sans-serif; transition:all 0.15s; }
    .pill-btn:hover { border-color:var(--red); color:var(--text); }
    .ad-top { border-bottom:1px solid var(--border); padding:8px; text-align:center; min-height:58px; display:flex; align-items:center; justify-content:center; background:var(--nav-bg); }
    .ad-label { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px; border:1px dashed var(--border); padding:14px 40px; border-radius:4px; }
    .mode-bar { border-bottom:1px solid var(--border); padding:0 24px; background:var(--nav-bg); }
    .mode-inner { max-width:1200px; margin:0 auto; display:flex; }
    .mode-btn { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); padding:13px 18px; cursor:pointer; font-size:0.88rem; font-weight:600; font-family:'Syne',sans-serif; transition:all 0.15s; }
    .mode-btn.active { color:var(--red); border-bottom-color:var(--red); }
    nav { border-bottom:1px solid var(--border); overflow-x:auto; white-space:nowrap; scrollbar-width:none; background:var(--nav-bg); }
    nav::-webkit-scrollbar { display:none; }
    .nav-inner { max-width:1200px; margin:0 auto; padding:6px 24px; display:flex; gap:4px; }
    .cat-btn { background:none; border:1px solid transparent; color:var(--muted); padding:6px 14px; cursor:pointer; font-size:0.8rem; border-radius:20px; transition:all 0.15s; font-family:'Inter',sans-serif; white-space:nowrap; }
    .cat-btn:hover { color:var(--text); border-color:var(--border); }
    .cat-btn.active { color:var(--red); border-color:var(--red); background:rgba(232,0,28,0.06); }
    .layout { max-width:1200px; margin:20px auto; padding:0 24px; display:grid; grid-template-columns:1fr 280px; gap:20px; }
    @media(max-width:860px){ .layout{grid-template-columns:1fr;padding:0 16px;} .sidebar{display:none;} }
    .status-bar { font-size:0.72rem; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:6px; }
    .live-dot { width:6px; height:6px; background:#22c55e; border-radius:50%; animation:pulse 2s infinite; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:10px; align-content:start; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:14px; display:flex; flex-direction:column; gap:9px; transition:background 0.15s,border-color 0.15s; }
    .card:hover { background:var(--hover); border-color:#ccc; }
    .card-top { display:flex; align-items:center; gap:6px; }
    .badge { margin-left:auto; font-size:0.63rem; color:var(--muted); background:rgba(0,0,0,0.04); padding:2px 7px; border-radius:10px; border:1px solid var(--border); white-space:nowrap; }
    .card-title { color:var(--text); text-decoration:none; font-size:0.88rem; font-weight:600; line-height:1.5; display:block; }
    .card-title:hover { color:var(--red); }
    .card-ingress { font-size:0.8rem; color:var(--ingress); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-time { font-size:0.68rem; color:var(--muted); }
    .sources-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:2px; }
    .source-link { font-size:0.68rem; font-weight:600; color:var(--red); text-decoration:none; text-transform:uppercase; letter-spacing:0.5px; padding:2px 7px; border:1px solid rgba(232,0,28,0.2); border-radius:10px; transition:all 0.15s; }
    .source-link:hover { background:rgba(232,0,28,0.08); border-color:var(--red); }
    .source-count { font-size:0.68rem; color:var(--muted); padding:2px 7px; border:1px solid var(--border); border-radius:10px; }
    .ad-feed { background:var(--card); border:1px dashed var(--border); border-radius:6px; min-height:90px; display:flex; align-items:center; justify-content:center; }
    .sidebar { display:flex; flex-direction:column; gap:14px; }
    .widget { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:16px; }
    .widget-title { font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:12px; }
    .trend-item { display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
    .trend-item:last-child { border:none; padding-bottom:0; }
    .trend-num { font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:800; color:var(--border); min-width:18px; line-height:1.5; }
    .trend-item a { font-size:0.8rem; color:var(--text); text-decoration:none; line-height:1.4; }
    .trend-item a:hover { color:var(--red); }
    .state { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--muted); }
    .spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 10px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    footer { border-top:1px solid var(--border); text-align:center; padding:20px; font-size:0.75rem; color:var(--muted); margin-top:10px; }
    footer a { color:var(--muted); text-decoration:none; }
    footer a:hover { color:var(--red); }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo"><a href="/" style="text-decoration:none;color:inherit">Nyhets<em>Hub</em></a></div>
    <div class="header-right">
      <button class="pill-btn" onclick="toggleTheme()" id="theme-btn" aria-label="Växla mörkt läge">🌙</button>
      <button class="pill-btn" onclick="toggleLang()" id="lang-btn" aria-label="Byt språk">EN</button>
    </div>
  </div>
</header>

<div class="ad-top" aria-label="Annons">
  <div class="ad-label">Annons 728×90</div>
</div>

<div class="mode-bar" role="navigation" aria-label="Nyhetsnivå">
  <div class="mode-inner">
    <button class="mode-btn active" id="btn-national" onclick="setMode('national',this)">🇸🇪 Nationellt</button>
    <button class="mode-btn" id="btn-regional" onclick="setMode('regional',this)">📍 Regionalt</button>
  </div>
</div>

<nav aria-label="Kategorier"><div class="nav-inner" id="tab-nav"></div></nav>

<div class="layout">
  <main id="main-content">
    <div class="status-bar" id="status-bar" aria-live="polite"></div>
    <div id="news-grid" aria-label="Nyheter"><div class="state"><div class="spinner"></div></div></div>
  </main>
  <aside class="sidebar" aria-label="Sidebar">
    <div class="widget" style="min-height:260px;display:flex;align-items:center;justify-content:center;" aria-label="Annons">
      <div class="ad-label">Annons 300×250</div>
    </div>
    <div class="widget">
      <div class="widget-title" id="t-trending">🔥 Trending</div>
      <div id="trending" role="list"></div>
    </div>
  </aside>
</div>

<footer>
  <p>© 2025 NyhetsHub – nyheter aggregerade från svenska medier</p>
  <p style="margin-top:6px">
    <a href="/?category=nyheter">Nyheter</a> ·
    <a href="/?category=sport">Sport</a> ·
    <a href="/?category=naringsliv">Näringsliv</a> ·
    <a href="/?category=politik">Politik</a> ·
    <a href="/?category=tech">Tech</a> ·
    <a href="/?category=kultur">Kultur</a> ·
    <a href="/?category=utrikes">Utrikes</a>
  </p>
</footer>

<script>
const CATS = [
  {id:'alla',sv:'Alla',en:'All'},
  {id:'nyheter',sv:'Nyheter',en:'News'},
  {id:'politik',sv:'Politik',en:'Politics'},
  {id:'naringsliv',sv:'Näringsliv',en:'Business'},
  {id:'sport',sv:'Sport',en:'Sports'},
  {id:'tech',sv:'Tech',en:'Tech'},
  {id:'kultur',sv:'Kultur',en:'Culture'},
  {id:'utrikes',sv:'Utrikes',en:'World'},
];
const CAT_LABELS = {nyheter:'Nyheter',sport:'Sport',naringsliv:'Näringsliv',kultur:'Kultur',tech:'Tech',politik:'Politik',utrikes:'Utrikes'};
const ALL_REGIONS = [
  'Blekinge','Dalarna','Gotland','Gävleborg','Halland',
  'Jämtland','Jönköping','Kalmar','Kronoberg','Norrbotten',
  'Skåne','Stockholm','Södermanland','Uppsala','Värmland',
  'Västerbotten','Västernorrland','Västmanland','Västra Götaland',
  'Örebro','Östergötland'
];

let mode = 'national', lang = 'sv', current = 'alla';

// Läs URL-parametrar vid start
const params = new URLSearchParams(window.location.search);
if (params.get('category')) current = params.get('category');
if (params.get('region')) { mode = 'regional'; current = params.get('region'); }

function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  current = m === 'national' ? 'alla' : ALL_REGIONS[0];
  renderTabs();
  load();
}

function renderTabs() {
  const nav = document.getElementById('tab-nav');
  if (mode === 'national') {
    nav.innerHTML = CATS.map(c =>
      `<button class="cat-btn${c.id===current?' active':''}" onclick="selectTab('${c.id}',this)">${lang==='sv'?c.sv:c.en}</button>`
    ).join('');
  } else {
    document.getElementById('btn-regional').classList.add('active');
    document.getElementById('btn-national').classList.remove('active');
    nav.innerHTML = ALL_REGIONS.map(r =>
      `<button class="cat-btn${r===current?' active':''}" onclick="selectTab('${encodeURIComponent(r)}',this)">${r}</button>`
    ).join('');
  }
}

function selectTab(val, el) {
  current = decodeURIComponent(val);
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  // Uppdatera URL utan reload
  const newUrl = mode === 'national'
    ? (current === 'alla' ? '/' : `/?category=${current}`)
    : `/?region=${encodeURIComponent(current)}`;
  history.pushState({}, '', newUrl);
  load();
}

async function load() {
  document.getElementById('news-grid').innerHTML = '<div class="state"><div class="spinner"></div></div>';
  try {
    const url = mode === 'national'
      ? `/api/news?category=${encodeURIComponent(current)}`
      : `/api/news?region=${encodeURIComponent(current)}`;
    const res = await fetch(url);
    const articles = await res.json();
    renderGrid(articles);
    renderTrending(articles.slice(0, 7));
    document.getElementById('status-bar').innerHTML =
      `<span class="live-dot"></span>${articles.length} nyheter`;
    // Uppdatera page title dynamiskt
    const label = mode === 'regional' ? current : (CAT_LABELS[current] || 'Alla');
    document.title = `${label} – NyhetsHub`;
  } catch(e) {
    document.getElementById('news-grid').innerHTML = '<div class="state">Kunde inte hämta nyheter.</div>';
  }
}

function renderGrid(articles) {
  if (!articles.length) {
    document.getElementById('news-grid').innerHTML = '<div class="state">Inga nyheter hittades.</div>';
    return;
  }
  document.getElementById('news-grid').innerHTML = articles.map((a, i) => {
    const time = a.published_at
      ? new Date(a.published_at).toLocaleString('sv-SE',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
      : '';
    const label = a.region || CAT_LABELS[a.category] || a.category;
    const ad = (i > 0 && i % 9 === 0) ? `<div class="ad-feed"><div class="ad-label">Annons</div></div>` : '';
    const sources = a.sources || [{ name: a.source, url: a.url }];
    const visibleSources = sources.slice(0, 4);
    const extraCount = sources.length - visibleSources.length;
    const sourcesHtml = `<div class="sources-row">
      ${visibleSources.map(s =>
        `<a class="source-link" href="${s.url}" target="_blank" rel="noopener noreferrer">${s.name}</a>`
      ).join('')}
      ${extraCount > 0 ? `<span class="source-count">+${extraCount} till</span>` : ''}
    </div>`;
    return ad + `<article class="card" itemscope itemtype="https://schema.org/NewsArticle">
      <div class="card-top">
        <span class="badge">${label}</span>
      </div>
      <a class="card-title" href="${a.url}" target="_blank" rel="noopener noreferrer"
         itemprop="headline url">${a.title}</a>
      ${a.ingress ? `<div class="card-ingress" itemprop="description">${a.ingress}</div>` : ''}
      ${sourcesHtml}
      <div class="card-time">
        <time itemprop="datePublished" datetime="${a.published_at}">${time}</time>
      </div>
    </article>`;
  }).join('');
}

function renderTrending(articles) {
  document.getElementById('trending').innerHTML = articles.map((a, i) =>
    `<div class="trend-item" role="listitem">
      <span class="trend-num">${i+1}</span>
      <a href="${a.url}" target="_blank" rel="noopener noreferrer">${a.title}</a>
    </div>`
  ).join('');
}

function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
  document.getElementById('theme-btn').textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}

function toggleLang() {
  lang = lang === 'sv' ? 'en' : 'sv';
  document.getElementById('lang-btn').textContent = lang === 'sv' ? 'EN' : 'SV';
  document.querySelector('html').lang = lang;
  document.getElementById('btn-national').textContent = lang === 'sv' ? '🇸🇪 Nationellt' : '🇸🇪 National';
  document.getElementById('btn-regional').textContent = lang === 'sv' ? '📍 Regionalt' : '📍 Regional';
  renderTabs();
}

// Återställ tema från localStorage
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('theme-btn').textContent = '☀️';
}

renderTabs();
load();
setInterval(load, 30 * 60 * 1000);
</script>
</body>
</html>
